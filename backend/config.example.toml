[database]
url = "postgres://rmqtt_user:rmqtt_pass@localhost:5432/rmqtt_things"

[mqtt]
url = "http://127.0.0.1:6060/api/v1"

[mqtt.publish.response]
qos = 2
retain = false
clientid = "rmqtt_things"

[mqtt.property_command.publish]
qos = 2
retain = false
clientid = "rmqtt_things"
topic = "productId/$clientid/thing/service/property/set"

[otel]
# log = ""
# trace = "http://localhost:4317"  # gRPC endpoint
# trace = "http://localhost:4318/v1/traces"  # HTTP endpoint
# metrics = ""

[api]
openapi_enabled = true
#serve_web_path = "./frontend/dist"

[mqtt.access.auth]
suffix = "suffix_go"
# Allowed skew (seconds) between a device's HMAC timestamp and server time.
# Default 300 (5 min). Raise for dev/testing (e.g. 604800 = 7 days) so a
# generated password stays valid longer; keep the default for production.
timestamp_tolerance_secs = 300

[s3]
endpoint = "http://localhost:9000"
region = "us-east-1"
access_key = "minioadmin"
secret_key = "minioadmin"
bucket = "rmqtt-things"
directories = ["${productId}/${deviceId}/*", "public/*"]
expired_seconds = 600

# CA certificates: runtime requires external CA files (ca.pem/ca.key) in ca_dir.
# Generate them once with: rmqtt-things --generate-ca
# (refuses to overwrite; delete ca.pem/ca.key first to regenerate)
[ca]
ca_dir = "conf"
name = "RMQTT Thing CA"
valid_days = 36503 # 100 years
domain = "*.fornetcode.com"

# [herald]
# base_url = "http://127.0.0.1:3000"
# api_key = "your-api-key"
# realm_id = "rmqtt"
# client_id = "admin-web-console"

# Factory (production-line) API keys for the /api/factory/* write path.
# Static config; keys are compared in constant time. Rotation requires a
# restart. When the [factory] section is omitted or api_keys is empty the
# factory routes reject every request with 401.
#
# File attachments uploaded via POST /api/factory/file/upload reuse the
# `[s3].directories` allow-list, but factory uploads carry NO product/device
# context — the `${productId}` / `${deviceId}` placeholders are silently
# substituted with empty strings. Configure factory-friendly rules with
# literal paths or static prefixes (e.g. "factory-attachments/*"); device-scoped
# rules like "${productId}/${deviceId}/*" will NOT match for factory uploads.
# [factory]
# api_keys = ["factory-api-key-please-change"]