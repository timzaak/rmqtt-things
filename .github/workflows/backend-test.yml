name: Backend Tests

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  nextest:
    name: Nextest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-nextest-${{ hashFiles('backend/Cargo.lock') }}

      - name: Run nextest
        run: python scripts/backend-test.py

      - name: Upload backend test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-output
          path: log/backend-test-output.log
          if-no-files-found: ignore

      - name: Stop test environment
        if: always()
        run: python scripts/test-stop.py
